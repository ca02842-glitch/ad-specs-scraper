name: Scrape Ad Specs

on:
  schedule:
    - cron: '0 0 * * 1' # 毎週月曜日に自動実行
  workflow_dispatch: # 手動で「実行ボタン」を押せるようにする設定

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v3

      - name: Pythonを準備
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 必要なツール（Playwright等）をインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          playwright install chromium

      - name: スクレイピングを実行し、GASへ送信！
        run: python scraper.py
